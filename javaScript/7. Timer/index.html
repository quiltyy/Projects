<!DOCTYPE html>
<html>
  <head>
    <title>Timer</title>
  </head>
  <body>
    <svg height="200" width="200">
      <circle
        r="90"
        cx="100"
        cy="100"
        fill="transparents"
        stroke="blue"
        stroke-width="10"
        stroke-dasharray="560"
        stroke-dashoffset="10"
      />

    <input id="duration" value="30" />
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <script src="timer.js"></script>
    <script src="index.js"></script>
  </body>
</html>
